<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WISHBot-AI</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="logo">WISH<span>Bot</span>-AI</div>
  <div class="badge">
    <span class="badge-dot"></span> ONLINE
  </div>
</header>

<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <h2>Your AI assistant — ask me anything</h2>
    <div class="sugs">
      <button class="sug" onclick="sug(this)">What is a black hole?</button>
      <button class="sug" onclick="sug(this)">Explain quantum computing</button>
      <button class="sug" onclick="sug(this)">Write a Python hello world</button>
      <button class="sug" onclick="sug(this)">How does WiFi work?</button>
      <button class="sug" onclick="sug(this)">Tell me a fun fact</button>
      <button class="sug" onclick="sug(this)">What is machine learning?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="inp" placeholder="Ask me anything..." rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
  </div>
  <div class="hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<script src="script.js"></script>
</body>
</html>
